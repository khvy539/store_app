{% extends "base.html" %}
{% block content %}
<h2>管理者</h2>

<p>DB: {{db_status}}</p>
<p>ENV: {{render_status}}</p>

<h4>未承認</h4>
{% for u in pending_users %}
<a href="/approve_user/{{u[0]}}" class="btn btn-success">{{u[1]}}</a>
{% endfor %}

<h4>在庫不足</h4>
{% for a in alerts %}
<p>{{a[0]}}: {{a[1]}}</p>
{% endfor %}

{% endblock %}

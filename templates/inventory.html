{% extends "base.html" %}
{% block content %}

<a href="/add_product" class="btn btn-primary mb-3">＋ 商品追加</a>

{% for p in products %}
<div class="card bg-secondary text-white mb-2">
  <div class="card-body">

    <h5>{{ p[1] }}</h5>

    <p>
      在庫: {{ p[2] }}<br>
      基準: {{ p[3] }}
    </p>

    {% if p[2] <= p[3] %}
      <span class="badge bg-danger">要発注</span>
    {% else %}
      <span class="badge bg-success">OK</span>
    {% endif %}

  </div>
</div>
{% endfor %}

{% endblock %}
